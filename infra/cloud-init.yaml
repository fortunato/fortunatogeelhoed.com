#cloud-config
# First-boot bootstrap only. Kept deliberately minimal and free of any app version so that routine
# deploys never need to touch it (changing this file forces the server to be replaced). Placeholders
# (__LIKE_THIS__) are filled in from Pulumi config before this is passed as user data.
package_update: true
packages:
  - docker.io
  # restic drives the off-site, encrypted Postgres backup (see umami-backup.sh).
  - restic

write_files:
  # Cap container logs so they can never fill the disk and take the whole host down with them. Also
  # disable Docker's userland proxy: with it on, connections to a published port reach the container
  # with their source rewritten to the docker bridge gateway, so Caddy (and the app behind it) see a
  # bogus client IP. Turning it off makes iptables forward the real source, which the dashboard's
  # remote_ip gate and the app's per-IP rate limiting both depend on.
  - path: /etc/docker/daemon.json
    permissions: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" },
        "userland-proxy": false
      }

  - path: /etc/fg/app.env
    permissions: '0600'
    owner: root:root
    content: |
      NODE_ENV=production
      TRUSTED_PROXY_HOPS=1
      CLIENT_IP_HEADER=
      # The public host the site is served on. Adds this domain to the first-party allow-list so the
      # same-origin guards (RUM, contact CSRF) and the framework switch recognise our own pages when
      # the deployment domain differs from the canonical site URL.
      PUBLIC_HOST=__DOMAIN__
      AHASEND_API_KEY=__AHASEND_API_KEY__
      AHASEND_ACCOUNT_ID=__AHASEND_ACCOUNT_ID__
      AHASEND_FROM_EMAIL=__AHASEND_FROM_EMAIL__
      AHASEND_FROM_NAME=__AHASEND_FROM_NAME__
      AHASEND_TO_EMAIL=__AHASEND_TO_EMAIL__
      # Single level gate in front of both stdout and Loki. Blank uses the app's built-in default
      # (info in production). Set e.g. debug to widen, warn to quiet, without a code release.
      LOG_LEVEL=__LOG_LEVEL__
      # Log shipping to hosted Loki. All three optional: when any is blank the app keeps logging to
      # stdout only (and the container logs are still captured by Docker's json-file driver above).
      LOKI_HOST=__LOKI_HOST__
      LOKI_USER=__LOKI_USER__
      LOKI_TOKEN=__LOKI_TOKEN__
      # Frontend RUM (Grafana Faro) forwarding target for the first-party /api/rum proxy. The URL
      # embeds the write key in its path, so it is the whole credential. Optional: without it the
      # proxy drops payloads and answers 204, so the site is unaffected.
      FARO_COLLECTOR_URL=__FARO_COLLECTOR_URL__
      # Self-hosted, cookieless analytics (Umami). The app injects the tracking tag into the served
      # HTML only when both the stats host and the website id are set; the website id is minted in
      # the Umami dashboard after first boot. data-domains pins recording to the production host, so
      # localhost and previews never report in. All optional: leave blank and no tag is injected.
      UMAMI_HOST=__UMAMI_HOST__
      UMAMI_WEBSITE_ID=__UMAMI_WEBSITE_ID__
      UMAMI_DOMAIN=__UMAMI_DOMAIN__

  # Postgres for Umami. The only stateful piece: its data dir lives on a dedicated Hetzner Volume
  # (mounted below), and this database backs nothing else.
  - path: /etc/fg/postgres.env
    permissions: '0600'
    owner: root:root
    content: |
      POSTGRES_DB=umami
      POSTGRES_USER=umami
      POSTGRES_PASSWORD=__UMAMI_DB_PASSWORD__
      # Keep the data in a subdirectory of the mount so the volume's lost+found does not collide with
      # Postgres' empty-dir check on first init.
      PGDATA=/var/lib/postgresql/data/pgdata

  # Umami app. Stateless: it holds no data on disk, runs its migrations on startup, and keeps all
  # state in Postgres. APP_SECRET signs sessions and must stay stable across restarts.
  - path: /etc/fg/umami.env
    permissions: '0600'
    owner: root:root
    content: |
      DATABASE_TYPE=postgresql
      DATABASE_URL=postgresql://umami:__UMAMI_DB_PASSWORD__@umami-db:5432/umami
      APP_SECRET=__UMAMI_APP_SECRET__

  # Off-site, encrypted Postgres backup. Runs daily via the systemd timer below: pg_dump from the
  # running container, encrypted and deduplicated by restic, pushed to off-Hetzner S3-compatible
  # object storage. All values optional: with no repository configured the job logs that backups are
  # disabled and exits cleanly, the same opt-in pattern as the Loki/Faro pipelines.
  - path: /etc/fg/backup.env
    permissions: '0600'
    owner: root:root
    content: |
      # restic repository, e.g. s3:https://s3.us-west-002.backblazeb2.com/<bucket>/umami or
      # s3:https://<account>.r2.cloudflarestorage.com/<bucket>/umami. Blank disables backups.
      RESTIC_REPOSITORY=__BACKUP_RESTIC_REPOSITORY__
      # Encryption passphrase for the restic repo. Without it the off-site copy cannot be restored,
      # so store it somewhere durable and separate from the host.
      RESTIC_PASSWORD=__BACKUP_RESTIC_PASSWORD__
      # S3-compatible credentials. This job runs `restic forget --prune`, which deletes objects, so
      # the token needs read+write+delete on the bucket; it is NOT append-only and a compromised host
      # could purge history. For immutability, enable R2 object-versioning / a bucket lifecycle policy
      # (recover deleted versions out-of-band) rather than relying on token scope.
      AWS_ACCESS_KEY_ID=__BACKUP_S3_ACCESS_KEY_ID__
      AWS_SECRET_ACCESS_KEY=__BACKUP_S3_SECRET_ACCESS_KEY__
      # Retention, pruned after each successful run.
      BACKUP_KEEP_DAILY=7
      BACKUP_KEEP_WEEKLY=4

  - path: /etc/fg/Caddyfile
    permissions: '0644'
    content: |
      __DOMAIN__ {
        encode zstd gzip
        reverse_proxy app:3000
      }

      # Canonicalise on the bare apex: permanently redirect the www host to it. Caddy obtains the
      # www certificate automatically, so the subdomain must resolve to this server (a www A/AAAA or
      # CNAME to the apex) for the ACME challenge to succeed.
      www.__DOMAIN__ {
        redir https://__DOMAIN__{uri} permanent
      }

      # Self-hosted analytics. Only Caddy faces the internet; Umami and Postgres stay on the private
      # docker network and are never published. Automatic HTTPS, same as the apex.
      #
      # Umami ships with a well-known default login (admin/umami) and this origin is trusted by the
      # main site's CSP for script-src, so an exposed dashboard would be an XSS pivot. We therefore
      # publish only the two paths collection actually needs and gate everything else (dashboard,
      # /login, admin /api/*) to the tailnet.
      #   - /script.js  the cookieless tracking script the site loads
      #   - /api/send   the event beacon the script POSTs page views to
      __STATS_DOMAIN__ {
        encode zstd gzip

        # Public collection surface: exact paths only, so the admin UI and admin API stay gated.
        @public path /script.js /api/send
        handle @public {
          reverse_proxy umami:3000
        }

        # Dashboard and everything else: operator-only. Gated by source IP, not HTTP basic auth:
        # Umami sets its own `Authorization: Bearer <token>` header on every API call, and basic auth
        # uses the same Authorization header, so the two collide and basic auth can never front the
        # dashboard. Restrict to the tailnet instead (default 100.64.0.0/10, the Tailscale range; the
        # host already runs Tailscale). Reach the dashboard by pointing stats.<domain> at the server's
        # tailnet IP (an /etc/hosts entry or MagicDNS) and browsing over Tailscale; the public TLS
        # cert still validates because the Host is unchanged. Off-tailnet the whole internet gets 403.
        handle {
          @denied not remote_ip __STATS_ALLOWED_CIDRS__
          respond @denied "Forbidden" 403
          reverse_proxy umami:3000
        }
      }

  - path: /opt/fg/deploy.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Forced-command deploy: the CI deploy key may run only this script. The requested image tag
      # arrives as the original SSH command; anything but a simple tag is refused.
      set -euo pipefail
      TAG="${SSH_ORIGINAL_COMMAND:-latest}"
      case "$TAG" in
        *[!a-zA-Z0-9._-]*) echo "refusing suspicious tag: $TAG" >&2; exit 1 ;;
      esac
      IMAGE="__IMAGE_REPO__:${TAG}"

      run_app() { docker run -d --name app --restart unless-stopped --network web --env-file /etc/fg/app.env "$1"; }

      # Remember the running image so a failed deploy can be rolled back to it.
      PREV="$(docker inspect --format '{{.Config.Image}}' app 2>/dev/null || true)"

      docker pull "$IMAGE"
      docker rm -f app 2>/dev/null || true
      run_app "$IMAGE"

      # Wait for the image's healthcheck to report healthy before declaring success.
      for _ in $(seq 1 30); do
        status="$(docker inspect --format '{{.State.Health.Status}}' app 2>/dev/null || echo starting)"
        [ "$status" = healthy ] && { echo "deployed $TAG"; docker image prune -f; exit 0; }
        [ "$status" = unhealthy ] && break
        sleep 2
      done

      echo "deploy of $TAG did not become healthy; rolling back" >&2
      docker rm -f app 2>/dev/null || true
      [ -n "$PREV" ] && { run_app "$PREV"; echo "rolled back to $PREV" >&2; }
      exit 1

  - path: /opt/fg/mount-umami-volume.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Prepare the dedicated Hetzner Volume for Postgres before the database container starts. The
      # volume is attached as a separate provisioning step that can finish just after this first boot
      # begins, so the device may not exist yet when cloud-init reaches the analytics section. Wait
      # for it, mount it, and only exit 0 once it is genuinely mounted, so the caller can refuse to
      # start Postgres otherwise: an unmounted /mnt/umami-db would let Postgres initialise a blank
      # database on the root disk while the real data sits untouched on the volume. Formats only an
      # unformatted volume; it never reformats one that already carries data.
      set -euo pipefail

      VOL_ID="__UMAMI_VOLUME_ID__"
      DEV="/dev/disk/by-id/scsi-0HC_Volume_${VOL_ID}"
      MNT=/mnt/umami-db

      mkdir -p "$MNT"

      # The attach races first boot: wait up to ~120s for the device node to appear.
      for _ in $(seq 1 60); do
        if [ -e "$DEV" ]; then break; fi
        sleep 2
      done
      if [ ! -e "$DEV" ]; then
        echo "umami-volume: $DEV never appeared; refusing to start Postgres" >&2
        exit 1
      fi

      # First use only: format an unformatted volume, never one that already carries data.
      if ! blkid "$DEV" >/dev/null 2>&1; then
        mkfs.ext4 -F "$DEV"
      fi

      # Persist the mount across reboots. nofail: never block boot if the volume is ever absent.
      grep -q "$DEV" /etc/fstab || \
        printf '%s %s ext4 discard,nofail,defaults 0 0\n' "$DEV" "$MNT" >> /etc/fstab

      if ! mountpoint -q "$MNT"; then
        mount "$MNT" || true
      fi
      # Hard guard: do not report success unless the volume is actually mounted.
      if ! mountpoint -q "$MNT"; then
        echo "umami-volume: $MNT failed to mount; refusing to start Postgres" >&2
        exit 1
      fi

      # Postgres runs as uid/gid 999 in the official image; own the data dir so it can write.
      mkdir -p "$MNT/data"
      chown -R 999:999 "$MNT/data"
      echo "umami-volume: $MNT ready on $DEV"

  - path: /opt/fg/umami-backup.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Daily off-site Postgres backup for Umami. Streams a logical pg_dump out of the running
      # database container, hands it to restic (encryption + dedup + retention built in), and prunes
      # to the retention policy. Every line goes to stdout/journald so it ships to Loki via the
      # docker/journal pipeline; the closing JSON line carries result=ok|degraded|failed|disabled so a
      # *missing* success can be alerted on (no ok line in N hours), not just explicit failures.
      # degraded means the backup was written but retention/prune did not complete.
      set -uo pipefail
      # shellcheck disable=SC1091
      set -a; . /etc/fg/backup.env; set +a

      stamp() { date -u +%Y-%m-%dT%H:%M:%SZ; }
      finish() {
        # One structured line per run for the alerting rule to match on.
        echo "{\"job\":\"umami-backup\",\"ts\":\"$(stamp)\",\"result\":\"$1\"${2:+,\"detail\":\"$2\"}}"
        exit "$3"
      }

      # Opt-in, like the other optional pipelines: no repo configured means backups are off.
      if [ -z "${RESTIC_REPOSITORY:-}" ] || [ -z "${RESTIC_PASSWORD:-}" ]; then
        finish disabled "no restic repository configured" 0
      fi

      # Do not echo RESTIC_REPOSITORY: it embeds the R2 account id and bucket and would ship to Loki.
      echo "umami-backup: starting at $(stamp)"
      # Initialise the repository on first run; ignore the "already initialized" case.
      restic snapshots >/dev/null 2>&1 || restic init || finish failed "restic init failed" 1

      # Dump straight from the container and pipe into restic under a stable logical path, so restic
      # dedupes day over day. pipefail makes a failing pg_dump fail the whole pipe.
      if docker exec umami-db pg_dump -U umami -d umami \
        | gzip \
        | restic backup --stdin --stdin-filename umami.sql.gz --tag umami --host fg-app; then
        # The fresh snapshot is safe at this point. Retention/prune deletes old snapshots on the
        # bucket and can fail independently (e.g. a transient bucket error); when it does the run is
        # degraded, not healthy, so retention can be alerted on without masking the good backup.
        if restic forget --tag umami \
          --keep-daily "${BACKUP_KEEP_DAILY:-7}" --keep-weekly "${BACKUP_KEEP_WEEKLY:-4}" \
          --prune; then
          finish ok "" 0
        fi
        finish degraded "backup ok but forget/prune failed" 1
      fi
      finish failed "pg_dump or restic backup failed" 1

  - path: /etc/systemd/system/umami-backup.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Off-site encrypted Postgres backup for Umami
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      ExecStart=/opt/fg/umami-backup.sh

  - path: /etc/systemd/system/umami-backup.timer
    permissions: '0644'
    content: |
      [Unit]
      Description=Run the Umami Postgres backup daily

      [Timer]
      OnCalendar=*-*-* 03:30:00 UTC
      RandomizedDelaySec=600
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /root/.ssh/fg_deploy.pub
    permissions: '0644'
    content: '__DEPLOY_PUBKEY__'

runcmd:
  # Enable Docker and restart it so the log-rotation defaults in daemon.json take effect (the
  # package may have started dockerd before that file was written).
  - systemctl enable docker
  - systemctl restart docker
  - docker network create web || true
  # Tailscale provides the only path for administrative and deploy SSH; no public SSH port is open.
  # --advertise-tags applies tag:fg-server explicitly rather than relying on the auth key being a
  # tagged key: it makes the tag (which the deploy ACL keys on, and which disables node-key expiry)
  # visible in the infrastructure, and fails the join loudly if the tag cannot be applied instead of
  # silently joining untagged and unreachable.
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=__TAILSCALE_AUTHKEY__ --hostname=fg-app --advertise-tags=tag:fg-server
  # Restrict the CI deploy key to the deploy script only (forced command, no shell, no forwarding).
  - install -d -m 0700 /root/.ssh
  - >
    printf 'command="/opt/fg/deploy.sh",no-agent-forwarding,no-port-forwarding,no-pty,no-X11-forwarding %s\n'
    "$(cat /root/.ssh/fg_deploy.pub)" >> /root/.ssh/authorized_keys
  # Log in to GHCR only when a token is configured (private image); a public image pulls anonymously.
  - if [ -n "__GHCR_TOKEN__" ]; then echo "__GHCR_TOKEN__" | docker login ghcr.io -u "__GHCR_USER__" --password-stdin; fi
  # Start the app only if an image has already been pushed. If none exists yet, provisioning still
  # completes cleanly and the first deploy will start it. Seed an image before the first
  # `pulumi up` (see infra/README.md, "Bootstrap order").
  - >
    docker pull __IMAGE_REPO__:latest
    && docker run -d --name app --restart unless-stopped --network web --env-file /etc/fg/app.env __IMAGE_REPO__:latest
    || echo "no image on GHCR yet; the first deploy will start the app"
  - >
    docker run -d --name caddy --restart unless-stopped --network web
    -p 80:80 -p 443:443
    -v /etc/fg/Caddyfile:/etc/caddy/Caddyfile:ro
    -v caddy_data:/data -v caddy_config:/config
    caddy:2

  # --- Self-hosted analytics (Umami + Postgres) ---------------------------------------------------
  # Prepare the dedicated Postgres volume: wait for the attach (it can land just after first boot),
  # format on first use only, mount it, and guard against the unmounted root-disk fallback. Start
  # Postgres only if that succeeded — otherwise it would initialise a blank database on the root disk
  # while the real data sits unmounted on the volume. Pinned by tag and digest (never latest); patch
  # upgrades bump both. Not published (no -p): reachable only by Umami on the private network under
  # the alias umami-db.
  - >
    /opt/fg/mount-umami-volume.sh
    && docker run -d --name umami-db --restart unless-stopped --network web
    --network-alias umami-db
    --env-file /etc/fg/postgres.env
    -v /mnt/umami-db/data:/var/lib/postgresql/data
    __POSTGRES_IMAGE__
    || echo "umami-db not started: volume not ready (see mount-umami-volume output above)" >&2
  # Umami app: stateless, fronted by Caddy on the stats subdomain. Pinned to an explicit version tag.
  - >
    docker run -d --name umami --restart unless-stopped --network web
    --env-file /etc/fg/umami.env
    __UMAMI_IMAGE__
  # Daily off-site encrypted backup of the Umami database. Enable the timer; the job itself no-ops
  # cleanly when no off-site repository is configured.
  - systemctl daemon-reload
  - systemctl enable --now umami-backup.timer
