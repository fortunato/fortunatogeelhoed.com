name: Setup
description: Install Bun, Node, and dependencies (cached), and optionally the Playwright browser.

inputs:
  playwright:
    description: Install the Playwright Chromium browser
    default: 'false'

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: .bun-version
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: .nvmrc
    # Reuse Bun's global module cache across runs so a frozen install only links, not downloads.
    - name: Cache Bun dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
    # The browser download is the single largest setup cost; cache it keyed on the resolved
    # Playwright version in the lockfile so it only re-downloads when that version changes.
    - name: Cache Playwright browser
      if: inputs.playwright == 'true'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright browser
      if: inputs.playwright == 'true'
      shell: bash
      run: bunx playwright install --with-deps chromium
