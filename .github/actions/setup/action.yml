name: Setup
description: Install Bun, Node, and dependencies (cached), and optionally the Playwright browser.

inputs:
  playwright:
    description: Install the Playwright Chromium browser
    default: 'false'

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version
    - uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
    # Reuse Bun's global module cache across runs so a frozen install only links, not downloads.
    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
    # The browser download is the single largest setup cost; cache it keyed on the resolved
    # Playwright version in the lockfile so it only re-downloads when that version changes.
    - name: Cache Playwright browser
      if: inputs.playwright == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright browser
      if: inputs.playwright == 'true'
      shell: bash
      run: bunx playwright install --with-deps chromium
