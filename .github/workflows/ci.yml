name: CI

# Runs the full test suite on every push and pull request and blocks on failure. The suite is split
# into independent jobs that run in parallel; the long pole is the showcase job (Storybook build plus
# its visual and per-story checks), so the lighter jobs finish hidden underneath it.
on:
  push:
    branches: [main]
  pull_request:

# Only the latest commit on a branch needs to be green; cancel superseded runs to free runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cheapest gate: static analysis with no build, so a lint or type error fails in seconds.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck

  # Pure logic tests. No browser, so this job skips the Playwright install entirely.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - name: Unit tests
        run: bun run test:unit

  # Real-browser component tests across the shared, React, Vue, and Angular projects.
  component:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
        with:
          playwright: 'true'
      - name: Component tests
        run: bun run test:component

  # Coverage report: runs the logic projects plus the shared web components in one instrumented pass
  # so Vitest merges node, happy-dom, and real-browser coverage into a single lcov for Codecov. Needs the
  # browser (the components only run there), which is why it is separate from the fast unit job.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
        with:
          playwright: 'true'
      - name: Tests with coverage
        run: bun run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Built-site tier: accessibility and end-to-end run against one site build. Pinned to Linux so
  # committed visual baselines match.
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
        with:
          playwright: 'true'
      - name: Build the site
        run: bun run build
      - name: Accessibility scan (WCAG 2.1 AA)
        run: bun run test:a11y
      - name: End-to-end tests
        run: bun run test:e2e

  # Showcase tier and the long pole: the Storybook build feeds both the cross-framework visual parity
  # check and the per-story accessibility + smoke pass, so they share one build here.
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
        with:
          playwright: 'true'
      - name: Build the showcase
        run: bun run build-storybook
      - name: Cross-framework visual parity
        run: bun run test:visual
      - name: Per-story accessibility + smoke
        run: bun run test:storybook

  # Single required check for branch protection: stays green only if every job above succeeded, so
  # renaming or adding a job never silently drops it from the required set.
  ci-success:
    if: always()
    needs: [static, unit, coverage, component, site, showcase]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "One or more CI jobs did not succeed: ${{ join(needs.*.result, ', ') }}"
              exit 1
            fi
          done
          echo "All CI jobs succeeded."
