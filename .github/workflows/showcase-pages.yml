name: Component Showcase

# Builds the composed component showcase, enforces cross-framework visual parity, and
# publishes it to GitHub Pages on the components.fortunatogeelhoed.com sub-domain.
#
# Release-gated, like the site deploy: the showcase tracks the last published release, not every
# push to main, so both public surfaces move together. Parity is still enforced on every push and
# pull request by the CI workflow; the gate here is a pre-publish safety net. A manual run
# republishes the current commit.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress run finish.
concurrency:
  group: showcase-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Build the composed showcase
        run: bun run build-storybook

      - name: Cross-framework visual-regression parity gate
        run: bun run test:visual

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist/storybook

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
