name: Deploy

# Publishing a versioned GitHub Release builds an immutable, version-tagged image and rolls that
# exact version onto the running server. Provisioning is separate and run by hand; this never
# touches the server's infrastructure, only the running container.
on:
  release:
    types: [published]
  # Manual build-and-push only — the deploy job is skipped. Use this to seed the first image to
  # GHCR before the server exists, so the initial `pulumi up` has an image to pull. See infra/README.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Grafana Faro identifiers for the single `fortunatogeelhoed.com` app. None are secret (they identify
# the app/stack/endpoint; the only secret is the upload token, FARO_SOURCEMAP_API_KEY). The endpoint
# comes from Frontend Observability > Settings > Source Maps; the CLI auths as Bearer <stackId>:<key>.
env:
  FARO_SOURCEMAP_ENDPOINT: https://faro-api-prod-eu-west-2.grafana.net/faro/api/v1
  FARO_APP_ID: '6056'
  FARO_STACK_ID: '1681452'

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          # The tag is the per-build bundle version: the client builds inject `<framework>-<tag>` so
          # runtime errors carry it; the sourcemaps job uploads maps under the same ids.
          build-args: |
            FARO_BUNDLE_VERSION=${{ steps.meta.outputs.tag }}
            FARO_SOURCEMAP_ENDPOINT=${{ env.FARO_SOURCEMAP_ENDPOINT }}
          # Persist BuildKit cache in the GitHub Actions cache so rebuilds reuse layers across runs
          # (the runner is ephemeral, so a Dockerfile cache mount alone would not survive).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sourcemaps:
    needs: image
    # Release only, and best-effort: publishing source maps is a convenience for de-obfuscating
    # production errors in Grafana, never a gate on shipping. continue-on-error keeps a failed upload
    # from failing the workflow, and deploy does not depend on this job, so they run in parallel.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Re-runs the build with the same args, so the cache from the image job is reused and only the
      # export stage runs; pulls the maps (kept out of the runtime image) onto the runner.
      - name: Export source maps from the build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: sourcemaps
          build-args: |
            FARO_BUNDLE_VERSION=${{ needs.image.outputs.tag }}
            FARO_SOURCEMAP_ENDPOINT=${{ env.FARO_SOURCEMAP_ENDPOINT }}
          cache-from: type=gha
          outputs: type=local,dest=sourcemaps
      - uses: oven-sh/setup-bun@v2
      # One upload per framework, each scoped to its own maps and explicit bundle id — the explicit
      # id is what lets the three frameworks share a single Faro app without colliding.
      - name: Upload source maps to Faro
        env:
          FARO_API_KEY: ${{ secrets.FARO_SOURCEMAP_API_KEY }}
        run: |
          for fw in react vue angular; do
            bunx @grafana/faro-cli@0.10.0 upload \
              --endpoint "$FARO_SOURCEMAP_ENDPOINT" \
              --app-id "$FARO_APP_ID" --stack-id "$FARO_STACK_ID" \
              --api-key "$FARO_API_KEY" \
              --bundle-id "$fw-${{ needs.image.outputs.tag }}" \
              --output-path "sourcemaps/$fw" \
              --recursive --gzip-payload --verbose
          done

  deploy:
    needs: image
    # Deploy only on a real release. A manual (workflow_dispatch) run just seeds the image — the
    # server may not exist yet, so there is nothing to deploy to.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      # Join the tailnet as an ephemeral node so the deploy can reach the server, which exposes no
      # public SSH. The node deregisters when the job ends.
      - name: Connect to the tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:fg-deploy
      # The deploy key is restricted to a forced command on the server, so this can only trigger a
      # pull-and-swap of the requested tag — the tag is passed as the SSH command.
      - name: Roll the server to the released version
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_deploy \
            root@fg-app "${{ needs.image.outputs.tag }}"
